# =============================================================================
# fly.toml — Fly.io deployment configuration for LegacyLift
# =============================================================================
# Deploy with: fly deploy
# First-time setup:
#   fly launch  (creates the app, sets app name)
#   fly secrets set OPENAI_API_KEY=sk-your-key-here
#   fly deploy
#
# See: https://fly.io/docs/reference/configuration/
# =============================================================================

# ---------------------------------------------------------------------------
# App identity
# ---------------------------------------------------------------------------
# TODO (implementer): change "legacylift" to your actual Fly.io app name
# (set during `fly launch`).
app = "legacylift"
primary_region = "syd"  # Sydney — closest to AEST demo audience

# ---------------------------------------------------------------------------
# Build
# ---------------------------------------------------------------------------
[build]
  # Use the Dockerfile in this directory
  dockerfile = "Dockerfile"

  # TODO (implementer): add build args if you need to pass build-time
  # variables (e.g. commit SHA for /health version endpoint):
  # [build.args]
  #   GIT_COMMIT = "override-at-deploy-time"

# ---------------------------------------------------------------------------
# HTTP service
# ---------------------------------------------------------------------------
[[services]]
  # Internal port the container listens on (matches CMD in Dockerfile)
  internal_port = 8000
  protocol = "tcp"

  [[services.ports]]
    # Accept HTTP on 80 and redirect to HTTPS
    port = 80
    handlers = ["http"]
    force_https = true

  [[services.ports]]
    # Accept HTTPS/WSS on 443
    # Fly.io terminates TLS here — the app gets plain HTTP/WS on 8000
    port = 443
    handlers = ["tls", "http"]

  # Health check — Fly.io calls this to decide if the deployment succeeded
  [services.concurrency]
    type = "requests"
    hard_limit = 200
    soft_limit = 100

  [[services.http_checks]]
    interval = "15s"
    timeout  = "5s"
    grace_period = "30s"
    method   = "GET"
    path     = "/health"

    # TODO (implementer): add auth header if you protect /health in production:
    # [services.http_checks.headers]
    #   Authorization = "Bearer ${HEALTH_CHECK_TOKEN}"

# ---------------------------------------------------------------------------
# VM sizing
# ---------------------------------------------------------------------------
[vm]
  # shared-cpu-1x is free tier — upgrade to dedicated for production loads
  # The LLM calls are network-bound, so CPU is less critical than memory
  size   = "shared-cpu-1x"
  memory = "512mb"

  # TODO (implementer): bump to performance-2x (2 vCPU, 4GB RAM) for
  # production workloads processing large COBOL codebases.

# ---------------------------------------------------------------------------
# Environment variables (non-secret)
# Set secrets via: fly secrets set KEY=value
# ---------------------------------------------------------------------------
[env]
  DEMO_MODE     = "false"    # Off in production — set true locally
  API_HOST      = "0.0.0.0"
  API_PORT      = "8000"
  OPENAI_MODEL  = "gpt-4o"
  LLM_PROVIDER  = "openai"
  AUTO_APPROVE  = "false"

  # TODO (implementer): add DATABASE_URL once you set up Fly Postgres:
  #   fly postgres create --name legacylift-db
  #   fly postgres attach legacylift-db
  # DATABASE_URL is auto-set by Fly when you attach a Postgres cluster.

# ---------------------------------------------------------------------------
# Secrets (set via `fly secrets set`, NOT here)
# ---------------------------------------------------------------------------
# fly secrets set OPENAI_API_KEY=sk-...
# fly secrets set DATABASE_URL=postgresql://...

# ---------------------------------------------------------------------------
# Persistent storage (for SQLite in single-instance mode)
# ---------------------------------------------------------------------------
# TODO (implementer): uncomment once you need persistent storage.
# Without this, SQLite data is lost on each deploy.
#
# [[mounts]]
#   source      = "legacylift_data"
#   destination = "/app/data"
