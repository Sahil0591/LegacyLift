name: Sync conduct demo script

on:
  push:
    branches: [main]
    paths:
      - "legacylift/**"
      - ".github/workflows/sync-conduct-demo-script.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Refresh repo snapshot in conduct demo script
        run: python legacylift/scripts/sync_conduct_demo_script.py

      - name: Commit and push if changed
        run: |
          if git diff --quiet -- legacylift/docs/conduct_demo_script.md; then
            echo "No doc changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add legacylift/docs/conduct_demo_script.md
          git commit -m "$(cat <<'EOF'
docs: sync conduct demo script with repo snapshot

Keep the Conduct-track demo script aligned with deploy URLs, routes, and demo fixtures after main updates.
EOF
)"
          git push
